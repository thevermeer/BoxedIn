<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <div class="popup-header">BoxedIn</div>
      <div class="popup-row popup-row--toggle">
        <span id="statusLabel">Enabled</span>
        <button type="button" id="toggleBtn" class="toggle-btn toggle-btn--on" title="Toggle extension"></button>
      </div>
      <div class="popup-divider"></div>
      <button type="button" id="optionsBtn" class="popup-link">Options</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
